info:
  name: addArtist
  type: http

http:
  method: POST
  url: http://localhost:3000/artists
  params:
    - name: ""
      value: ""
      type: query
  body:
    type: json
    data: '{"genre": "Classical", "artist": "Beethoven"}'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
